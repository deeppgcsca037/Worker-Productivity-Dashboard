services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - productivity_data:/app/data
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  productivity_data:
